name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check shell helper syntax
        run: |
          set -euo pipefail
          bash -n scripts/init-kb.sh
          bash -n scripts/check-kb.sh

      - name: Compile Python sources
        run: python3 -m compileall runtime adapters tests

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v

      - name: Validate example knowledge base
        run: bash scripts/check-kb.sh example-kb

      - name: Run init smoke test
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          bash scripts/init-kb.sh "$tmpdir"
          test -f "$tmpdir/AGENT.md"
          test -f "$tmpdir/wiki/active.md"
          test -f "$tmpdir/meta/lint-status.json"
